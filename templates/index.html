<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>Media Downloader Pro - Batch & Multi-Format</title>

    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Media DL">
    <link rel="apple-touch-icon" href="/static/icon-192.png">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.1/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-body: #0a0a0a;
            --bg-card: #171717;
            --bg-input: #121212;
            --border-color: #262626;
            --border-focus: #ef4444;
            --text-main: #ededed;
            --text-muted: #a1a1aa;
            --accent: #ef4444;
            --accent-hover: #dc2626;
            --success: #10b981;
            --error: #ef4444;
            --btn-back: #27272a;
            --btn-back-hover: #3f3f46;
            --shadow-card: 0 20px 40px rgba(0, 0, 0, 0.4);
            --placeholder-img: #27272a;
        }

        [data-theme="light"] {
            --bg-body: #f3f4f6;
            --bg-card: #ffffff;
            --bg-input: #f9fafb;
            --border-color: #e5e7eb;
            --border-focus: #ef4444;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --accent: #ef4444;
            --accent-hover: #dc2626;
            --success: #10b981;
            --error: #ef4444;
            --btn-back: #e5e7eb;
            --btn-back-hover: #d1d5db;
            --shadow-card: 0 10px 25px rgba(0, 0, 0, 0.05);
            --placeholder-img: #e5e7eb;
        }

        * {
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: var(--text-main);
            padding: 20px;
            position: relative;
        }

        .theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            z-index: 100;
        }

        .theme-toggle:hover {
            background: var(--bg-input);
            transform: scale(1.05);
        }

        .container {
            background: var(--bg-card);
            padding: 40px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-card);
            width: 100%;
            max-width: 450px;
            box-sizing: border-box;
            text-align: center;
        }

        h2 {
            margin-top: 0;
            margin-bottom: 24px;
            font-size: 22px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        h2 i {
            color: var(--accent);
        }

        .input-group {
            position: relative;
            margin-bottom: 16px;
        }

        .input-group i {
            position: absolute;
            left: 16px;
            top: 15px;
            color: var(--text-muted);
            font-size: 14px;
        }

        textarea {
            width: 100%;
            padding: 14px 16px 14px 40px;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            box-sizing: border-box;
            outline: none;
            background-color: var(--bg-input);
            color: var(--text-main);
            resize: vertical;
            min-height: 52px;
            max-height: 150px;
            line-height: 1.5;
        }

        textarea:focus {
            border-color: var(--border-focus);
            box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.1);
        }

        textarea::placeholder {
            color: var(--text-muted);
        }

        select {
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 16px;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            box-sizing: border-box;
            outline: none;
            background-color: var(--bg-input);
            color: var(--text-main);
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23a1a1aa' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 16px center;
            background-size: 14px;
        }

        select:focus {
            border-color: var(--border-focus);
            box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.1);
        }

        button.btn-primary {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 14px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        button.btn-primary:hover {
            background-color: var(--accent-hover);
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            justify-content: left;
            margin-bottom: 16px;
            background: var(--bg-input);
            padding: 12px 16px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
        }

        .checkbox-container input[type="checkbox"] {
            margin-right: 12px;
            width: 16px;
            height: 16px;
            accent-color: var(--accent);
            cursor: pointer;
        }

        .checkbox-container label {
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-text {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 12px;
        }

        .back-btn {
            background-color: var(--btn-back);
            color: var(--text-main);
            margin-top: 20px;
        }

        .back-btn:hover {
            background-color: var(--btn-back-hover);
        }

        .preview-card {
            display: none;
            align-items: center;
            gap: 12px;
            background: var(--bg-input);
            padding: 10px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            margin-bottom: 16px;
            text-align: left;
        }

        .preview-card img {
            width: 100px;
            height: 56px;
            border-radius: 6px;
            object-fit: cover;
            background: var(--placeholder-img);
        }

        .preview-info {
            flex: 1;
            overflow: hidden;
        }

        .preview-title {
            margin: 0 0 4px 0;
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text-main);
        }

        .preview-channel {
            margin: 0 0 6px 0;
            font-size: 11px;
            color: var(--text-muted);
        }

        .preview-duration {
            font-size: 10px;
            background: var(--btn-back);
            padding: 3px 6px;
            border-radius: 4px;
            font-weight: 600;
            color: var(--text-main);
        }

        .progress-wrapper {
            width: 100%;
            background-color: var(--bg-input);
            border-radius: 8px;
            height: 16px;
            overflow: hidden;
            margin-bottom: 10px;
            border: 1px solid var(--border-color);
        }

        .progress-fill {
            height: 100%;
            background-color: var(--success);
            width: 0%;
            transition: width 0.4s ease;
        }

        .progress-percent {
            font-size: 14px;
            font-weight: bold;
            color: var(--success);
            margin-bottom: 15px;
        }

        .trim-container {
            display: none;
            gap: 12px;
            margin-bottom: 16px;
        }

        .trim-box {
            flex: 1;
            text-align: left;
        }

        .trim-label {
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 600;
            display: block;
            margin-bottom: 6px;
        }

        .trim-input-wrapper {
            position: relative;
        }

        .trim-input-wrapper i {
            position: absolute;
            left: 12px;
            top: 13px;
            color: var(--text-muted);
            font-size: 12px;
        }

        .trim-input {
            margin-bottom: 0 !important;
            padding-left: 32px !important;
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            background: var(--bg-input);
            color: var(--text-main);
        }

        .fa-spinner {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        .qr-wrapper {
            background: white;
            padding: 15px;
            border-radius: 12px;
            display: inline-block;
            margin: 15px 0;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        #qrcode img {
            display: block;
            margin: 0 auto;
        }

        @media (max-width: 480px) {
            .container {
                padding: 24px 20px;
                border-radius: 12px;
                border: none;
                box-shadow: none;
                margin-top: 50px;
            }

            body {
                padding: 0;
                background-color: var(--bg-card);
                align-items: flex-start;
                padding-top: 10px;
            }

            .theme-toggle {
                top: 15px;
                right: 15px;
                background: var(--bg-input);
            }
        }
    </style>
</head>

<body>
    <button id="themeToggle" class="theme-toggle" aria-label="Ganti Tema"><i class="fa-solid fa-moon"></i></button>

    <div class="container">
        <h2><i class="fa-solid fa-cloud-arrow-down"></i> Media Downloader</h2>

        {% if task_id %}
        <div id="loadingScreen">
            <div class="status-text" id="statusMessage"><i class="fa-solid fa-spinner"></i> Memulai Download...</div>
            <div class="progress-wrapper">
                <div class="progress-fill" id="progressBar"></div>
            </div>
            <div class="progress-percent" id="progressText">0%</div>
            <p style="font-size: 12px; color: var(--text-muted);"><i class="fa-solid fa-info-circle"></i> Proses
                berjalan. Jika Batch (Banyak Link), indikator ini akan berulang untuk setiap file.</p>
        </div>

        <div id="resultScreen" style="display: none;">
            <div class="status-text" id="finalMessage"></div>
            <div class="qr-wrapper" id="qrContainer" style="display: none;">
                <div id="qrcode"></div>
            </div>
            <p id="qrHelpText" style="font-size: 12px; color: var(--text-muted); margin-bottom: 20px; display: none;"><i
                    class="fa-solid fa-mobile-screen"></i> Scan QR Code ini untuk mengirim file ke HP Anda.</p>
            <a href="/" style="text-decoration: none;"><button class="btn-primary back-btn"><i
                        class="fa-solid fa-rotate-left"></i> Download File Lain</button></a>
        </div>

        <script>
            const taskId = "{{ task_id }}";
            const socket = io();

            const loadingScreen = document.getElementById('loadingScreen');
            const resultScreen = document.getElementById('resultScreen');
            const finalMessage = document.getElementById('finalMessage');
            const progressBar = document.getElementById('progressBar');
            const progressText = document.getElementById('progressText');
            const statusMessage = document.getElementById('statusMessage');

            socket.on('progress', function (data) {
                if (data.task_id === taskId) {
                    let percent = parseFloat(data.progress);
                    if (!isNaN(percent)) { progressBar.style.width = percent + "%"; progressText.innerText = percent.toFixed(1) + "%"; }
                    if (data.processing_msg) { statusMessage.innerHTML = `<i class="fa-solid fa-spinner"></i> ` + data.processing_msg; }
                    else if (percent > 0) { statusMessage.innerHTML = `<i class="fa-solid fa-download"></i> Mengunduh File...`; }
                }
            });

            socket.on('completed', function (data) {
                if (data.task_id === taskId) {
                    loadingScreen.style.display = 'none'; resultScreen.style.display = 'block';
                    finalMessage.innerHTML = "<i class='fa-solid fa-circle-check'></i> Selesai! File siap diunduh."; finalMessage.style.color = "var(--success)";
                    const downloadUrl = window.location.origin + '/ambil_file/' + taskId;
                    document.getElementById('qrContainer').style.display = 'inline-block'; document.getElementById('qrHelpText').style.display = 'block';
                    new QRCode(document.getElementById("qrcode"), { text: downloadUrl, width: 140, height: 140, colorDark: "#000000", colorLight: "#ffffff", correctLevel: QRCode.CorrectLevel.L });
                    window.location.href = downloadUrl;
                }
            });

            socket.on('error', function (data) {
                if (data.task_id === taskId) {
                    loadingScreen.style.display = 'none'; resultScreen.style.display = 'block';
                    finalMessage.innerHTML = "<i class='fa-solid fa-circle-xmark'></i> Terjadi Kesalahan:<br><span style='font-size:12px; font-weight:normal; color: var(--text-muted); display: block; margin-top:5px;'>" + data.error + "</span>"; finalMessage.style.color = "var(--error)";
                }
            });
        </script>

        {% else %}
        <form method="POST" id="downloadForm">
            <div class="input-group">
                <i class="fa-solid fa-link"></i>
                <textarea name="url" id="urlInput"
                    placeholder="Paste link YouTube, IG, TikTok, atau Spotify di sini...&#10;(Untuk Batch, paste banyak link pisahkan dengan Enter)"
                    required></textarea>
            </div>

            <div class="preview-card" id="previewCard">
                <img id="previewImage" src="" alt="Thumbnail">
                <div class="preview-info">
                    <h4 class="preview-title" id="previewTitle">Memuat info...</h4>
                    <p class="preview-channel" id="previewChannel">Harap tunggu sebentar</p>
                    <span class="preview-duration" id="previewDuration">00:00</span>
                </div>
            </div>

            <div class="checkbox-container">
                <input type="checkbox" id="is_playlist" name="is_playlist">
                <label for="is_playlist"><i class="fa-solid fa-list"></i> Download Seluruh Playlist / Carousel
                    IG</label>
            </div>

            <div class="checkbox-container">
                <input type="checkbox" id="enable_trim" onchange="toggleTrim()">
                <label for="enable_trim"><i class="fa-solid fa-scissors"></i> Potong Durasi (Hanya untuk 1 Link)</label>
            </div>

            <div class="trim-container" id="trimOptions">
                <div class="trim-box">
                    <label class="trim-label">MULAI (MM:SS)</label>
                    <div class="trim-input-wrapper"><i class="fa-regular fa-clock"></i><input type="text"
                            name="start_time" class="trim-input" placeholder="00:00"></div>
                </div>
                <div class="trim-box">
                    <label class="trim-label">SELESAI (MM:SS)</label>
                    <div class="trim-input-wrapper"><i class="fa-solid fa-stopwatch"></i><input type="text"
                            name="end_time" class="trim-input" placeholder="00:00"></div>
                </div>
            </div>

            <select name="format" id="formatSelect" onchange="toggleOptions()" required>
                <option value="video">🎥 Format: Video Lengkap</option>
                <option value="audio">🎵 Format: Hanya Audio</option>
                <option value="metadata">📄 Format: Hanya Metadata (JSON)</option>
            </select>

            <select name="video_ext" id="videoExtSelect">
                <option value="mp4" selected>Ekstensi Video: MP4 (Standar)</option>
                <option value="mkv">Ekstensi Video: MKV (Untuk 8K/4K)</option>
                <option value="webm">Ekstensi Video: WebM</option>
                <option value="avi">Ekstensi Video: AVI</option>
                <option value="mov">Ekstensi Video: MOV (Apple)</option>
            </select>

            <select name="resolution" id="resolutionSelect">
                <option value="4320">Resolusi: 8K (4320p)</option>
                <option value="2160">Resolusi: 4K (2160p)</option>
                <option value="1440">Resolusi: 2K (1440p)</option>
                <option value="1080" selected>Resolusi: Full HD (1080p)</option>
                <option value="720">Resolusi: HD (720p)</option>
                <option value="480">Resolusi: SD (480p)</option>
            </select>

            <select name="audio_quality" id="audioQualitySelect" style="display: none;">
                <option value="mp3_192" selected>Audio: MP3 (192kbps)</option>
                <option value="mp3_320">Audio: MP3 (320kbps Tinggi)</option>
                <option value="m4a">Audio: M4A (Apple AAC)</option>
                <option value="webm">Audio: WebM (Opus/Vorbis)</option>
                <option value="wav">Audio: WAV (Lossless Uncompressed)</option>
                <option value="flac">Audio: FLAC (Lossless HD)</option>
                <option value="opus">Audio: OPUS (Kecil & Jernih)</option>
            </select>

            <button type="submit" class="btn-primary"><i class="fa-solid fa-download"></i> Download Sekarang</button>
        </form>

        <script>
            function toggleTrim() {
                var isChecked = document.getElementById("enable_trim").checked;
                var trimOptions = document.getElementById("trimOptions");
                if (isChecked) trimOptions.style.display = "flex";
                else { trimOptions.style.display = "none"; document.querySelector('input[name="start_time"]').value = ""; document.querySelector('input[name="end_time"]').value = ""; }
            }

            function toggleOptions() {
                var format = document.getElementById("formatSelect").value;
                if (format === "audio") {
                    document.getElementById("resolutionSelect").style.display = "none";
                    document.getElementById("videoExtSelect").style.display = "none";
                    document.getElementById("audioQualitySelect").style.display = "block";
                    document.getElementById("trimOptions").style.opacity = "1";
                    document.getElementById("enable_trim").disabled = false;
                } else if (format === "metadata") {
                    document.getElementById("resolutionSelect").style.display = "none";
                    document.getElementById("videoExtSelect").style.display = "none";
                    document.getElementById("audioQualitySelect").style.display = "none";
                    
                    // Nonaktifkan fitur trim jika metadata karena tidak relevan
                    document.getElementById("enable_trim").checked = false;
                    document.getElementById("enable_trim").disabled = true;
                    toggleTrim(); 
                } else {
                    document.getElementById("resolutionSelect").style.display = "block";
                    document.getElementById("videoExtSelect").style.display = "block";
                    document.getElementById("audioQualitySelect").style.display = "none";
                    document.getElementById("enable_trim").disabled = false;
                }
            }

            let typingTimer;
            const urlInput = document.getElementById('urlInput');
            const previewCard = document.getElementById('previewCard');

            urlInput.addEventListener('input', () => {
                clearTimeout(typingTimer);
                const rawUrl = urlInput.value.trim();

                const urls = rawUrl.split(/\r?\n|,/).map(u => u.trim()).filter(u => u !== '');

                const formatSelect = document.getElementById('formatSelect');
                const resSelect = document.getElementById('resolutionSelect');
                const videoExtSelect = document.getElementById('videoExtSelect');

                if (urls.length > 1) {
                    previewCard.style.display = 'flex';
                    document.getElementById('previewTitle').innerHTML = "<i class='fa-solid fa-layer-group'></i> Mode Batch Aktif";
                    document.getElementById('previewChannel').innerText = urls.length + " Link Terdeteksi";
                    document.getElementById('previewDuration').innerHTML = "<i class='fa-solid fa-boxes-packing'></i> Multi-file";
                    document.getElementById('previewImage').style.display = 'none'; 
                    document.getElementById('enable_trim').disabled = true; 
                    
                    // Aktifkan semua opsi format di batch (Video, Audio, Metadata)
                    Array.from(formatSelect.options).forEach(opt => opt.disabled = false);
                    return;
                }

                document.getElementById('previewImage').style.display = 'block';
                document.getElementById('enable_trim').disabled = false;

                // Logika Auto-Detect Platform untuk 1 link
                if (urls.length === 1) {
                    if (urls[0].includes('spotify.com')) {
                        // Jika Spotify, jangan izinkan format Video, tapi boleh Audio atau Metadata
                        Array.from(formatSelect.options).forEach(opt => {
                            if(opt.value === 'video') opt.disabled = true;
                            else opt.disabled = false;
                        });
                        if(formatSelect.value === 'video') {
                            formatSelect.value = 'audio';
                        }
                        toggleOptions();
                    } else {
                        Array.from(formatSelect.options).forEach(opt => opt.disabled = false);
                        if (urls[0].includes('instagram.com') || urls[0].includes('tiktok.com')) {
                            videoExtSelect.value = 'mp4'; videoExtSelect.disabled = true;
                            Array.from(resSelect.options).forEach(opt => {
                                if (parseInt(opt.value) > 1080) opt.style.display = 'none'; else opt.style.display = 'block';
                            });
                            if (parseInt(resSelect.value) > 1080) resSelect.value = '1080';
                        } else {
                            videoExtSelect.disabled = false; Array.from(resSelect.options).forEach(opt => opt.style.display = 'block');
                        }
                    }
                }

                if (urls.length === 0) { previewCard.style.display = 'none'; Array.from(formatSelect.options).forEach(opt => opt.disabled = false); return; }

                typingTimer = setTimeout(() => { fetchPreviewData(urls[0]); }, 800);
            });

            urlInput.addEventListener('input', () => {
                clearTimeout(typingTimer);
                const rawUrl = urlInput.value.trim();

                const urls = rawUrl.split(/\r?\n|,/).map(u => u.trim()).filter(u => u !== '');

                const formatSelect = document.getElementById('formatSelect');
                const resSelect = document.getElementById('resolutionSelect');
                const videoExtSelect = document.getElementById('videoExtSelect');

                if (urls.length > 1) {
                    previewCard.style.display = 'flex';
                    document.getElementById('previewTitle').innerHTML = "<i class='fa-solid fa-layer-group'></i> Mode Batch Aktif";
                    document.getElementById('previewChannel').innerText = urls.length + " Link Terdeteksi";
                    document.getElementById('previewDuration').innerHTML = "<i class='fa-solid fa-boxes-packing'></i> Multi-file";
                    document.getElementById('previewImage').style.display = 'none';
                    document.getElementById('enable_trim').disabled = true;
                    formatSelect.disabled = false; // Buka pilihan format di batch
                    return;
                }

                document.getElementById('previewImage').style.display = 'block';
                document.getElementById('enable_trim').disabled = false;

                // Logika Auto-Detect Platform untuk 1 link
                if (urls.length === 1) {
                    if (urls[0].includes('spotify.com')) {
                        // Jika Spotify, paksa ke Audio
                        formatSelect.value = 'audio';
                        formatSelect.disabled = true;
                        toggleOptions();
                    } else {
                        formatSelect.disabled = false;
                        if (urls[0].includes('instagram.com') || urls[0].includes('tiktok.com')) {
                            videoExtSelect.value = 'mp4'; videoExtSelect.disabled = true;
                            Array.from(resSelect.options).forEach(opt => {
                                if (parseInt(opt.value) > 1080) opt.style.display = 'none'; else opt.style.display = 'block';
                            });
                            if (parseInt(resSelect.value) > 1080) resSelect.value = '1080';
                        } else {
                            videoExtSelect.disabled = false; Array.from(resSelect.options).forEach(opt => opt.style.display = 'block');
                        }
                    }
                }

                if (urls.length === 0) { previewCard.style.display = 'none'; formatSelect.disabled = false; return; }

                typingTimer = setTimeout(() => { fetchPreviewData(urls[0]); }, 800);
            });

            // Mengaktifkan kembali format select sebelum disubmit jika sedang didisable (agar nilainya terkirim)
            document.getElementById('downloadForm').addEventListener('submit', function () {
                document.getElementById('formatSelect').disabled = false;
            });

            function fetchPreviewData(url) {
                previewCard.style.display = 'flex';
                document.getElementById('previewTitle').innerHTML = "<i class='fa-solid fa-spinner' style='color: var(--text-muted);'></i> <span style='color: var(--text-muted);'>Mencari media...</span>";
                document.getElementById('previewChannel').innerText = "";

                fetch('/preview', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ url: url }) })
                    .then(res => res.json())
                    .then(data => {
                        if (data.success) {
                            document.getElementById('previewTitle').innerText = data.title;
                            document.getElementById('previewChannel').innerText = data.uploader;
                            document.getElementById('previewDuration').innerHTML = "<i class='fa-regular fa-clock'></i> " + data.duration;
                            if (data.thumbnail) {
                                if (url.includes('instagram.com')) { document.getElementById('previewImage').src = '/proxy_gambar?url=' + encodeURIComponent(data.thumbnail); }
                                else { document.getElementById('previewImage').src = data.thumbnail; }
                            }
                        } else {
                            document.getElementById('previewTitle').innerHTML = "<i class='fa-solid fa-circle-exclamation'></i> <span style='color: var(--error);'>Gagal memuat info</span>";
                        }
                    });
            }
        </script>
        {% endif %}
    </div>

    <script>
        const themeToggleBtn = document.getElementById('themeToggle'); const themeIcon = themeToggleBtn.querySelector('i'); const htmlElement = document.documentElement;
        function setTheme(theme) {
            if (theme === 'light') { htmlElement.setAttribute('data-theme', 'light'); themeIcon.classList.replace('fa-sun', 'fa-moon'); localStorage.setItem('ytTheme', 'light'); }
            else { htmlElement.removeAttribute('data-theme'); themeIcon.classList.replace('fa-moon', 'fa-sun'); localStorage.setItem('ytTheme', 'dark'); }
        }
        const savedTheme = localStorage.getItem('ytTheme'); if (savedTheme) setTheme(savedTheme); else setTheme('dark');
        themeToggleBtn.addEventListener('click', () => { setTheme(htmlElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light'); });
    </script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('PWA Service Worker terdaftar!', reg.scope))
                    .catch(err => console.log('Gagal mendaftar Service Worker', err));
            });
        }
    </script>
</body>

</html>
